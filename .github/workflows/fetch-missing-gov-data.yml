name: fetch-missing-gov-data

on:
  workflow_dispatch:
  schedule:
    - cron: "00 08 * * *"    #runs at 08:00am UTC everyday

jobs:
  getdata:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
    - name: Setup Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: 3.9
    - name: Install Python dependencies
      uses: py-actions/py-dependency-install@v4.1.0
      with:
        path: "requirements.txt"
        update-pip: "false"
        update-setuptools: "false"
        update-wheel: "false"
    - name: execute py script
      run: python python/fetch_missing_gov_data.py
      env:
        BASEROW_ACCESS_TOKEN: ${{ secrets.BASEROW_ACCESS_TOKEN }} 